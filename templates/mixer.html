<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StemTube Mixer</title>
<style>
  /* ──────────────────────────────────────────────────────────────────────────
     THEME SYSTEM
     Every colour is a CSS variable. The DEFAULT (POC green) lives on :root so the
     app looks right even before JS runs. Alternative themes override the same
     variable names on body[data-theme="…"], so switching is a single attribute
     flip with zero structural change — and stays re-integrable into StemTube,
     whose palette these themes mirror (Dark = Spotify green, Cyberpunk, Neumorphic).
     Variable names are kept stable (--bg/--panel/--line/--accent/--text/--muted)
     so nothing downstream breaks. ────────────────────────────────────────────── */
  :root, body[data-theme="poc"] {
    --bg:#15171c; --panel:#1e2128; --bg-secondary:#1e1e1e; --bg-tertiary:#262a33;
    --line:#2c313b; --accent:#3ddc84; --accent-hi:#66e6a0;
    --muted:#5a6472; --text:#e7ebf0; --on-accent:#0c1410;
    --ctrlW:190px;
    /* action colours (StemTube palette) */
    --play:#4caf50; --play-hi:#66d96b;      /* Play / From Start — green */
    --play-bg:rgba(76,175,80,.18); --play-bg-hi:rgba(76,175,80,.28); --play-fg:#9be29e;
    --stop:#ff5252; --stop-bg:rgba(255,82,82,.15); --stop-bg-hi:rgba(255,82,82,.25); --stop-fg:#ff9a9a;
    --rec:#ff3b3b;                           /* Record — red dot */
    --rec-bg:rgba(255,59,59,.15); --rec-bg-hi:rgba(255,59,59,.26);
    --export-a:#1db954; --export-b:#1ed760;  /* Export — Spotify green gradient */
    --export-fg:#08210f;
    --beat-rgb:102,217,107;                  /* Play beat-pulse glow */
    --pulse-bg:rgba(76,175,80,.42); --pulse-bg-down:rgba(102,217,107,.6); --pulse-rest:rgba(76,175,80,.16);
    --playhead:#ff5d5d;
    --ctrlH:30px;                            /* compact, single-line bar */
    --radius:7px; --radius-lg:8px;
    --panel-shadow:none;
  }
  /* ── StemTube Dark (the app's default theme — Spotify green on near-black) ── */
  body[data-theme="dark"] {
    --bg:#121212; --panel:#1e1e1e; --bg-secondary:#181818; --bg-tertiary:#2d2d2d;
    --line:#333333; --accent:#1DB954; --accent-hi:#1ed760;
    --muted:#8a8a8a; --text:#ffffff; --on-accent:#06140b;
    --play:#1DB954; --play-hi:#1ed760;
    --play-bg:rgba(29,185,84,.18); --play-bg-hi:rgba(29,185,84,.30); --play-fg:#5be08a;
    --stop:#ff5252; --stop-bg:rgba(255,82,82,.15); --stop-bg-hi:rgba(255,82,82,.26); --stop-fg:#ff9a9a;
    --rec:#ff3b3b; --rec-bg:rgba(255,59,59,.15); --rec-bg-hi:rgba(255,59,59,.26);
    --export-a:#1db954; --export-b:#1ed760; --export-fg:#06140b;
    --beat-rgb:30,215,96;
    --pulse-bg:rgba(29,185,84,.42); --pulse-bg-down:rgba(30,215,96,.6); --pulse-rest:rgba(29,185,84,.16);
    --playhead:#ff5d5d;
    --radius:8px; --radius-lg:8px; --panel-shadow:none;
  }
  /* ── Cyberpunk Neon (deep indigo, electric cyan) ── */
  body[data-theme="cyberpunk"] {
    --bg:#0f0c29; --panel:#171340; --bg-secondary:#120e33; --bg-tertiary:#211a55;
    --line:#2c2470; --accent:#00d4ff; --accent-hi:#33dfff;
    --muted:#7a78c8; --text:#e8eaf6; --on-accent:#001016;
    --play:#00e676; --play-hi:#33ff95;
    --play-bg:rgba(0,212,255,.16); --play-bg-hi:rgba(0,212,255,.28); --play-fg:#7ce9ff;
    --stop:#ff5252; --stop-bg:rgba(255,82,82,.16); --stop-bg-hi:rgba(255,82,82,.28); --stop-fg:#ff9a9a;
    --rec:#ff4081; --rec-bg:rgba(255,64,129,.16); --rec-bg-hi:rgba(255,64,129,.28);
    --export-a:#00d4ff; --export-b:#33dfff; --export-fg:#001016;
    --beat-rgb:0,212,255;
    --pulse-bg:rgba(0,212,255,.40); --pulse-bg-down:rgba(51,223,255,.6); --pulse-rest:rgba(0,212,255,.14);
    --playhead:#ff4081;
    --radius:6px; --radius-lg:10px; --panel-shadow:0 0 0 1px rgba(0,212,255,.04);
  }
  /* ── Neumorphic Anthracite (soft slate, dual-tone shadows) ── */
  body[data-theme="neumorphic"] {
    --bg:#2a2d35; --panel:#2a2d35; --bg-secondary:#23262d; --bg-tertiary:#32363f;
    --line:#3a3f4a; --accent:#1DB954; --accent-hi:#1ed760;
    --muted:#8a92a1; --text:#e0e4ea; --on-accent:#06140b;
    --play:#1DB954; --play-hi:#1ed760;
    --play-bg:rgba(29,185,84,.16); --play-bg-hi:rgba(29,185,84,.28); --play-fg:#7ad79a;
    --stop:#ff5252; --stop-bg:rgba(255,82,82,.14); --stop-bg-hi:rgba(255,82,82,.24); --stop-fg:#ff9a9a;
    --rec:#ff3b3b; --rec-bg:rgba(255,59,59,.14); --rec-bg-hi:rgba(255,59,59,.24);
    --export-a:#1db954; --export-b:#1ed760; --export-fg:#06140b;
    --beat-rgb:30,215,96;
    --pulse-bg:rgba(29,185,84,.40); --pulse-bg-down:rgba(30,215,96,.55); --pulse-rest:rgba(29,185,84,.14);
    --playhead:#ff6b6b;
    --radius:9px; --radius-lg:12px;
    --panel-shadow:4px 4px 8px #1c1e24, -4px -4px 8px #383c48;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.4 system-ui,Segoe UI,Roboto,sans-serif; }
  header { padding:12px 16px; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  h1 { font-size:16px; margin:0 8px 0 0; font-weight:600; }
  /* theme switcher — colour swatches; the active theme gets an accent ring */
  .theme-switch { display:inline-flex; gap:7px; align-items:center; margin-left:auto; flex:0 0 auto; }
  .theme-switch .swatch {
    width:20px; height:20px; padding:0; border-radius:50%; cursor:pointer; position:relative;
    border:1px solid rgba(255,255,255,.18);
    background:linear-gradient(135deg, var(--sw) 0 50%, var(--sw2) 50% 100%);
    transition:transform .12s, box-shadow .12s; box-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  .theme-switch .swatch:hover { transform:scale(1.12); }
  .theme-switch .swatch.on { box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--sw); }
  input[type=text] { background:var(--panel); border:1px solid var(--line); color:var(--text); padding:8px 10px; border-radius:6px; min-width:260px; }
  select { background:var(--panel); color:var(--text); border:1px solid var(--line); padding:8px; border-radius:6px; }
  button { background:var(--panel); border:1px solid var(--line); color:var(--text); padding:8px 14px; border-radius:6px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); color:var(--on-accent); border-color:var(--accent); font-weight:600; }
  button:disabled { opacity:.45; cursor:default; }
  button.toggle.on { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  /* ───────────── Transport bar — compact, icon-first, single line ─────────── */
  .transport { padding:6px 14px; border-bottom:1px solid var(--line); display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
  .transport .sep { width:1px; height:20px; background:var(--line); margin:0 4px; flex:0 0 auto; }
  .transport .spacer { flex:1 1 auto; }   /* pushes the right-hand group out */
  .trgroup { display:inline-flex; align-items:center; gap:5px; flex-wrap:nowrap; }

  /* one shared height for every interactive control in the bar */
  .transport button,
  .transport .tpgroup,
  .transport .zoomctl,
  .transport .zoomctl .zgroup { height:var(--ctrlH); box-sizing:border-box; }
  .transport .tpgroup button { height:22px; }

  /* base button — square icon button; labelled variant opts in with .labeled */
  .transport > button, .trgroup > button {
    display:inline-flex; align-items:center; justify-content:center; gap:5px;
    min-width:var(--ctrlH); padding:0 6px; font-size:12px; font-weight:500; line-height:1;
    border-radius:7px; background:var(--panel); border:1px solid var(--line); color:var(--text);
    transition:background .12s, border-color .12s, box-shadow .12s, opacity .12s; white-space:nowrap;
  }
  .transport > button.labeled, .trgroup > button.labeled { padding:0 10px; }
  .transport > button:hover:not(:disabled), .trgroup > button:hover:not(:disabled) { background:var(--bg-tertiary); border-color:var(--accent); }
  .transport > button:disabled, .trgroup > button:disabled { opacity:.4; }
  .transport > button .ico, .trgroup > button .ico { font-size:13px; line-height:1; }
  /* hide a button's text label, keep only the icon (compact mode) */
  .transport > button .lbl, .trgroup > button .lbl { display:none; }

  /* semantic colours — all theme-driven */
  #playBtn, #fromStartBtn { border-color:transparent; background:var(--play-bg); color:var(--play-fg); }
  #playBtn:hover:not(:disabled), #fromStartBtn:hover:not(:disabled) { background:var(--play-bg-hi); }
  #stopBtn { border-color:transparent; background:var(--stop-bg); color:var(--stop-fg); }
  #stopBtn:hover:not(:disabled) { background:var(--stop-bg-hi); }
  #recordBtn { border-color:transparent; background:var(--rec-bg); }
  #recordBtn:hover:not(:disabled) { background:var(--rec-bg-hi); }
  #recordBtn .dot { width:9px; height:9px; border-radius:50%; background:var(--rec); display:inline-block; }
  #exportBtn { border:none; background:linear-gradient(135deg,var(--export-a),var(--export-b)); color:var(--export-fg); font-weight:600; }
  #exportBtn:hover:not(:disabled) { filter:brightness(1.08); }

  /* active toggle (Detect Intro, Precount, Scroll mode) */
  .transport button.toggle.on { background:var(--accent); color:var(--on-accent); border-color:var(--accent); font-weight:600; }
  /* precount/scroll-mode show a tiny value next to the icon */
  #precountBtn .lbl, #scrollModeBtn .lbl { display:inline; font-size:11px; font-weight:600; }

  /* Play beat-pulse: a green glow that beats with the metronome/precount.
     .pulse triggers one flash; .pulse-strong (downbeats) is bigger. */
  #playBtn.beat { animation:beatGlow .18s ease-out; }
  #playBtn.beat.down { animation:beatGlowStrong .22s ease-out; }
  @keyframes beatGlow {
    0% { box-shadow:0 0 0 0 rgba(var(--beat-rgb),.55); background:var(--pulse-bg); }
    100% { box-shadow:0 0 0 7px rgba(var(--beat-rgb),0); background:var(--pulse-rest); }
  }
  @keyframes beatGlowStrong {
    0% { box-shadow:0 0 0 0 rgba(var(--beat-rgb),.85); background:var(--pulse-bg-down); }
    100% { box-shadow:0 0 0 12px rgba(var(--beat-rgb),0); background:var(--pulse-rest); }
  }

  .time { font-variant-numeric:tabular-nums; color:var(--muted); font-size:13px; min-width:108px; text-align:center; }
  .muted-label { color:var(--muted); font-size:12px; }

  /* zoom controls — label + grouped −/+ buttons + reset */
  .zoomctl { display:inline-flex; align-items:center; gap:5px; color:var(--muted); font-size:12px; }
  .zoomctl .zlab { font-weight:600; color:var(--text); }
  .zoomctl .zgroup { display:inline-flex; align-items:center; background:var(--bg); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .zbtn { background:transparent; border:none; color:var(--text); width:32px; height:100%; font-size:15px; line-height:1; cursor:pointer; padding:0; display:inline-flex; align-items:center; justify-content:center; }
  .zbtn:hover { background:var(--line); }
  .zoomctl .zgroup .zbtn:first-child { border-right:1px solid var(--line); }
  .zreset { border:1px solid var(--line); border-radius:8px; width:var(--ctrlH); height:var(--ctrlH); box-sizing:border-box; }

  /* tempo / pitch controls (BPM + Key) */
  .tpgroup { display:inline-flex; align-items:center; gap:5px; color:var(--muted); font-size:12px;
    border:1px solid var(--line); border-radius:8px; padding:0 8px; background:var(--panel); }
  .tpgroup .lab { font-weight:600; color:var(--text); margin-right:1px; font-size:12px; }
  .tpgroup button { padding:0 7px; font-size:14px; line-height:1; min-width:24px; height:26px; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--text); cursor:pointer; }
  .tpgroup button:hover { border-color:var(--accent); }
  .tpgroup .val { font-variant-numeric:tabular-nums; color:var(--accent); min-width:34px; text-align:center; font-size:14px; font-weight:600; }
  #pitchVal { min-width:52px; }   /* room for "C# min" */
  .tpgroup input.val { background:var(--bg); border:1px solid var(--line); border-radius:5px; padding:3px 4px; width:46px; min-width:46px; }
  .tpgroup .unit { font-size:11px; color:var(--muted); }
  .tpgroup .reset { font-size:11px; opacity:.55; min-width:22px; }
  .tpgroup .reset.active { opacity:1; border-color:var(--accent); color:var(--accent); }
  .tpgroup .ratio { font-size:11px; color:var(--muted); min-width:38px; text-align:right; }

  /* single load zone */
  #dropzone { flex:1; min-width:280px; border:1.5px dashed var(--line); border-radius:8px; padding:10px 14px; color:var(--muted); text-align:center; transition:.15s; }
  #dropzone.drag { border-color:var(--accent); color:var(--accent); background:rgba(61,220,132,.06); }
  #dropzone button { padding:3px 8px; }

  /* progress bar */
  .progress { padding:8px 16px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; }
  .pbar { flex:1; height:10px; background:var(--panel); border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .pfill { height:100%; width:0%; background:var(--accent); transition:width .25s; }
  .pstage { color:var(--text); font-size:13px; min-width:200px; }

  /* ── Fixed layout: header + transport + status are flow; the editor below is
     a 2-column grid. LEFT = fixed control column (never scrolls). RIGHT = the
     ONLY scroll/zoom area (timeline pinned at its top, waveforms below). ── */
  html,body { height:100%; }
  body { display:flex; flex-direction:column; }
  header, .transport, .status { flex:0 0 auto; }
  #editor { flex:1 1 auto; min-height:0; display:grid; grid-template-columns: var(--ctrlW) 1fr; border-top:1px solid var(--line); }

  /* left column (controls) — fixed, vertical scroll mirrors the right pane */
  #leftcol { border-right:1px solid var(--line); background:var(--panel); overflow:hidden; }
  #left-corner { height:26px; border-bottom:1px solid var(--line); background:var(--bg); }
  /* ── Track controls — compact, two-row grid that NEVER grows vertically ──
     Row 1: colour dot + stem name (+ metronome resolution selector, right-aligned).
     Row 2: square M / S / ● buttons (perfectly aligned) · compact volume fader
            (flex-grows into the free space, no longer a full-width bar) · pan.
     Square icon buttons (fixed 24px) guarantee vertical alignment that the old
     variable-width "Mute"/"Solo" text labels couldn't. Uses StemTube colours via
     the theme variables, so it restyles with the rest of the app. ── */
  #left-tracks .lctrl { padding:7px 12px; border-bottom:1px solid var(--line); display:flex; flex-direction:column; gap:6px; justify-content:center; }
  .lctrl.metro .name, .lctrl.drums .name { color:var(--accent); }
  .lctrl .name { font-weight:600; font-size:13px; text-transform:capitalize; display:flex; align-items:center; gap:7px; min-height:18px; }
  .lctrl .name .dot { width:10px; height:10px; border-radius:50%; flex:0 0 10px; box-shadow:0 0 0 2px rgba(0,0,0,.18); }

  /* control row: button cluster | volume fader | pan */
  .lctrl .ctl-row { display:flex; align-items:center; gap:8px; }
  .lctrl .btns { display:flex; gap:4px; align-items:center; flex:0 0 auto; }
  /* square, uniform icon buttons — identical footprint → columns line up */
  .lctrl .btns button {
    width:24px; height:24px; padding:0; font-size:11px; font-weight:700; line-height:1;
    display:inline-flex; align-items:center; justify-content:center;
    border-radius:6px; background:var(--bg-tertiary); border:1px solid var(--line); color:var(--muted);
    transition:background .12s, border-color .12s, color .12s;
  }
  .lctrl .btns button:hover { border-color:var(--accent); color:var(--text); }
  .lctrl .btns button.on { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  .lctrl .btns button.rec.on { background:var(--rec); color:#fff; border-color:var(--rec); }
  .lctrl .btns button.rec .dot { width:8px; height:8px; border-radius:50%; background:var(--rec); display:inline-block; }
  .lctrl .btns button.rec.on .dot { background:#fff; }

  /* volume fader — fills the free space (compact, not a giant full-width bar) */
  .lctrl .vol { flex:1 1 auto; min-width:40px; }

  /* pan — compact, right-aligned (does not change row height) */
  .lctrl .pan { flex:0 0 auto; display:flex; align-items:center; gap:3px; }
  .lctrl .pan .panlab { font-size:9px; color:var(--muted); line-height:1; }
  .lctrl .pan .panrange { width:40px; }

  /* metronome resolution selector, docked to the right of the name row */
  .lctrl .name .metrores { margin-left:auto; }

  /* the metronome control hosts an extra row → top-align its rows (don't vertical-
     center) and never crush them below the content height. */
  .lctrl.metro { justify-content:flex-start; }
  .lctrl.metro .ctl-row { margin-top:2px; }

  /* metronome instrument (timbre) row — its OWN line below the control row, so the
     full-width dropdown is always visible and aligned with the controls above. */
  .lctrl .metroinst-row { display:flex; align-items:center; gap:8px; margin-top:2px; }
  .lctrl .metroinst-row .metroinst-lab {
    font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase;
    letter-spacing:.04em; flex:0 0 auto; }
  .lctrl .metroinst-row .metroinst {
    flex:1 1 auto; min-width:0; height:24px; font-size:11px; font-weight:600;
    border-radius:6px; padding:0 6px; background:var(--bg-tertiary);
    border:1px solid var(--line); color:var(--text); cursor:pointer;
    transition:border-color .12s; }
  .lctrl .metroinst-row .metroinst:hover { border-color:var(--accent); }
  .lctrl .metroinst-row .metroinst:disabled { opacity:.5; cursor:progress; }

  /* ── Track sliders: StemTube style (thin track + round accent thumb) ── */
  .lctrl .vol, input.panrange {
    -webkit-appearance:none; appearance:none;
    height:4px; background:var(--bg-secondary); border-radius:2px; outline:none;
    margin:0; cursor:pointer;
  }
  .lctrl .vol::-webkit-slider-thumb, input.panrange::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:12px; height:12px; border-radius:50%; background:var(--accent); cursor:pointer; border:none;
    box-shadow:0 1px 3px rgba(0,0,0,.35);
  }
  .lctrl .vol::-webkit-slider-thumb:hover, input.panrange::-webkit-slider-thumb:hover { background:var(--accent-hi); }
  .lctrl .vol::-moz-range-thumb, input.panrange::-moz-range-thumb {
    width:12px; height:12px; border-radius:50%; background:var(--accent); cursor:pointer; border:none;
  }
  .lctrl .vol::-moz-range-track, input.panrange::-moz-range-track {
    height:4px; background:var(--bg-secondary); border-radius:2px;
  }
  /* floating value bubble shown on hover / while dragging vol & pan sliders */
  #ctrl-bubble { position:fixed; z-index:60; pointer-events:none; display:none;
    background:var(--bg); color:var(--accent); border:1px solid var(--accent);
    border-radius:5px; padding:2px 7px; font-size:12px; font-variant-numeric:tabular-nums;
    font-weight:600; white-space:nowrap; transform:translate(-50%,-115%);
    box-shadow:0 3px 12px rgba(0,0,0,.5); }
  /* metronome click-resolution selector (½ / 1 / 2) — compact, inline on the name row */
  .metrores { display:inline-flex; gap:3px; }
  .metrores button { padding:1px 6px; height:18px; font-size:10px; font-weight:600; line-height:1;
    font-variant-numeric:tabular-nums; border-radius:5px; background:var(--bg-tertiary);
    border:1px solid var(--line); color:var(--muted); cursor:pointer; transition:background .12s,border-color .12s,color .12s; }
  .metrores button:hover { border-color:var(--accent); color:var(--text); }
  .metrores button.on { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }

  /* right pane — the ONLY horizontally scrollable region */
  #rightpane { overflow-x:auto; overflow-y:auto; position:relative; }
  /* ── Waveform scroll bars: StemTube "lyrics" style — green thumb on a thin track ── */
  #rightpane::-webkit-scrollbar { width:8px; height:8px; }
  #rightpane::-webkit-scrollbar-track { background:var(--bg-secondary,#1e1e1e); border-radius:4px; }
  #rightpane::-webkit-scrollbar-thumb { background:var(--accent); border-radius:4px; }
  #rightpane::-webkit-scrollbar-thumb:hover { background:#1ed760; }
  #rightpane::-webkit-scrollbar-corner { background:var(--bg-secondary,#1e1e1e); }
  /* Firefox */
  #rightpane { scrollbar-width:thin; scrollbar-color:var(--accent) var(--bg-secondary,#1e1e1e); }
  /* Viewport rendering: the lane/timeline DIVs carry the full song width (so the
     scrollbar is correct), but their CANVAS is sticky at left:0 and only as wide
     as the viewport — drawn for the visible slice. Avoids the 65536px canvas cap. */
  #timeline-wrap { height:26px; border-bottom:1px solid var(--line); background:var(--bg); position:sticky; top:0; z-index:2; overflow:hidden; }
  /* Canvas is viewport-sized and absolutely positioned; we move it with style.left
     = scrollLeft on every scroll so it stays pinned to the visible edge while the
     lane DIV (full song width) drives the scrollbar. (sticky doesn't work here:
     an overflow container re-anchors it to the wrong edge.) */
  #timeline-canvas { position:absolute; left:0; top:0; }
  #lanes { position:relative; }
  #lanes .lane { border-bottom:1px solid var(--line); overflow:hidden; position:relative; }
  #lanes .lane canvas { position:absolute; left:0; top:0; }
  /* playhead = a thin absolutely-positioned line moved with style.left (no per-frame canvas redraw).
     Lives in #rightpane so it spans the timeline + all lanes; scrolls with the content. */
  /* height is set in JS to span the timeline + all lanes (full content height),
     because top:0/bottom:0 in a scroll container only covers the VISIBLE height. */
  #playhead-line { position:absolute; top:0; width:0; border-left:1.5px solid var(--playhead); pointer-events:none; z-index:4; left:0; }
  /* Start marker (count-in target) — a dashed green line, height set in JS. */
  /* Start marker — same ⚑ flag glyph as the From-Start button, planted on the timeline */
  #start-line { position:absolute; top:0; width:0; border-left:2px dashed var(--accent); pointer-events:none; z-index:3; left:0; }
  #start-line::before { content:"⚑"; position:absolute; top:-1px; left:2px; font-size:13px; line-height:1;
    color:var(--on-accent); background:var(--accent); padding:1px 3px 2px; border-radius:0 4px 4px 0; }
  /* Metronome-stop marker — where the click goes silent (the stems keep playing). */
  /* Amber dashed line with a ⏹ glyph, mirroring the green Start flag. */
  #stop-line { position:absolute; top:0; width:0; border-left:2px dashed #ffb02e; pointer-events:none; z-index:3; left:0; }
  #stop-line::before { content:"⏹"; position:absolute; top:-1px; left:-15px; font-size:13px; line-height:1;
    color:#08210f; background:#ffb02e; padding:1px 3px 2px; border-radius:4px 0 0 4px; }
  /* A/B loop region — a translucent band from A to B across timeline + all lanes.
     Defined by dragging on a waveform; spans every track. Brighter borders when looping. */
  #loop-region { position:absolute; top:0; left:0; pointer-events:none; z-index:2;
    background:rgba(90,141,239,.12); border-left:2px solid rgba(90,141,239,.7); border-right:2px solid rgba(90,141,239,.7); }
  #loop-region.on { background:rgba(90,141,239,.22); border-left-color:#5a8def; border-right-color:#5a8def; }
  /* count-in overlay number — fixed, centered on the whole viewport */
  #countdown { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    font-size:160px; font-weight:800; color:var(--accent); opacity:.92; text-shadow:0 4px 28px rgba(0,0,0,.7);
    pointer-events:none; z-index:50; }
  canvas { display:block; }
  .status { padding:8px 16px; color:var(--muted); font-size:13px; min-height:20px; border-top:1px solid var(--line); }

  /* file browser modal */
  #browser { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:10; }
  #browser .box { background:var(--panel); border:1px solid var(--line); border-radius:10px; width:560px; max-height:70vh; display:flex; flex-direction:column; }
  #browser .bhead { padding:12px 14px; border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:center; }
  #browser .blist { overflow:auto; padding:6px; }
  #browser .file { padding:8px 10px; border-radius:6px; cursor:pointer; display:flex; justify-content:space-between; }
  #browser .file:hover { background:var(--line); }
  #browser .file .sz { color:var(--muted); font-size:12px; }

  /* song title — POC size, but accent-green like the Friend header */
  #song-title-display { color:var(--accent); }

  /* ── Internal mixer tabs (Mixer / Chords / Lyrics) ── */
  .mixer-tabs { display:inline-flex; gap:4px; margin-left:auto; }
  .mixer-tabs .mtab { background:var(--panel); border:1px solid var(--line); color:var(--muted);
    padding:6px 12px; border-radius:7px; cursor:pointer; font-size:13px; font-weight:600; }
  .mixer-tabs .mtab:hover { border-color:var(--accent); color:var(--text); }
  .mixer-tabs .mtab.on { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }

  /* Tab content swap: #editor is the Mixer tab; .tabview are Chords/Lyrics.
     The transport bar stays shared/visible in every tab. */
  .tabview { display:none; flex:1 1 auto; min-height:0; overflow:auto; }
  body[data-tab="mixer"]   #editor      { display:grid; }
  body[data-tab="mixer"]   #chords-view,
  body[data-tab="mixer"]   #lyrics-view { display:none; }
  body[data-tab="chords"]  #editor      { display:none; }
  body[data-tab="chords"]  #chords-view { display:block; }
  body[data-tab="lyrics"]  #editor      { display:none; }
  body[data-tab="lyrics"]  #lyrics-view { display:block; }
  /* Mixer-only view controls (zoom / scroll-mode / export) hidden on Chords+Lyrics.
     The Focus button replaces them on those tabs. */
  body:not([data-tab="mixer"]) #viewControls { display:none; }
  body[data-tab="mixer"] #focusBtn { display:none !important; }

  /* The chords/lyrics/popup look comes from Friend's own CSS (chords.css,
     karaoke.css, export.css, structure.css), kept verbatim. Those files use
     Friend's variable names (--accent-color, --bg-tertiary, --text-primary…);
     the POC theme defines different names (--accent, --bg, --text…). Bridge the
     two so Friend's CSS renders with the active POC theme colours. */
  :root, body {
    --bg-color: var(--bg);
    --bg-primary: var(--bg);
    --bg-secondary: var(--bg-secondary, var(--panel));
    --bg-tertiary: var(--bg-tertiary, var(--panel));
    --bg-hover: var(--line);
    --text-color: var(--text);
    --text-primary: var(--text);
    --text-secondary: var(--muted);
    --text-muted: var(--muted);
    --accent-color: var(--accent);
    --accent-hover: var(--accent-hi);
    --accent-rgb: var(--beat-rgb);
    --border-color: var(--line);
    --border-radius: var(--radius-lg);
    --error-color: var(--stop);
    --success-color: var(--play);
  }
  /* Just cap the chords view width so it doesn't sprawl on a wide screen;
     the diagram sizing itself comes from chords.css. */
  #chords-view { padding:10px 14px; }
  #chords-view .practice-panel { max-width:980px; margin:0 auto; }

  /* Lyric line under the chord grid: shown ONCE in its starting measure, allowed
     to spill across the following (empty) bars instead of being clipped/ellipsised
     to one measure or repeated in every bar. */
  #chords-view .chord-linear-lyrics-row {
    overflow: visible;
    text-overflow: clip;
    position: relative;
    z-index: 1;
  }

  /* Recording track: control block (left) styled like a stem .lctrl; the lane
     (right) holds a full-width .waveform whose canvas friend's engine draws into. */
  .rec-lctrl .rec-arm-btn { width:24px; height:24px; padding:0; font-size:11px; font-weight:700;
    display:inline-flex; align-items:center; justify-content:center; border-radius:6px;
    background:var(--bg-tertiary); border:1px solid var(--line); color:var(--muted); cursor:pointer; }
  .rec-lctrl .rec-arm-btn.on { background:var(--rec); border-color:var(--rec); color:#fff; }
  .rec-lctrl .name .rec-expand-btn { flex:0 0 auto; width:20px; background:none; border:none; color:var(--muted); cursor:pointer; padding:0; font-size:11px; }
  .rec-lctrl .name .rec-expand-btn:hover { color:var(--text); }
  .rec-lctrl .name .rec-expand-btn.open i { transform:rotate(180deg); display:inline-block; }
  .rec-lctrl .track-name { flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* Track-settings dropdown = a FLOATING popover (position:fixed). It must not
     grow the left column: the columns' scroll is driven by the lanes' height, so
     in-flow growth made the menu unreachable at the bottom ("not enough room to
     scroll"). Fixed positioning escapes #leftcol's overflow:hidden clipping. */
  .rec-lctrl .rec-expanded-controls { display:none; position:fixed; z-index:75;
    width:236px; max-height:62vh; overflow:auto; flex-direction:column; gap:8px;
    background:var(--panel); border:1px solid var(--line); border-radius:9px;
    padding:10px 12px; box-shadow:0 12px 36px rgba(0,0,0,.55); }
  .rec-lctrl .rec-expanded-controls.open { display:flex; }
  .rec-lctrl .rec-expanded-controls .rec-popover-title { font-size:11px; font-weight:700;
    color:var(--accent); text-transform:uppercase; letter-spacing:.4px; }
  .rec-lctrl .rec-expanded-controls select { background:var(--bg); color:var(--text); border:1px solid var(--line);
    border-radius:5px; font-size:11px; padding:3px 4px; }
  .rec-lctrl .rec-input-row { display:flex; align-items:center; gap:6px; }
  .rec-lctrl .input-level-meter { flex:1; height:6px; background:var(--bg); border-radius:3px; overflow:hidden; }
  .rec-lctrl .input-level-fill { height:100%; width:0%; background:linear-gradient(90deg,#3ddc84,#e6d24a,#ff5252); transition:width .05s; }
  .rec-lctrl .monitor-control { display:flex; align-items:center; gap:4px; color:var(--muted); font-size:11px; }
  .rec-lctrl .monitor-slider { width:48px; }
  .rec-lctrl .rec-debleed-row, .rec-lctrl .rec-fx-row { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
  .rec-lctrl .rec-fx-desc { font-size:10px; color:var(--muted); }
  .rec-lctrl .rec-delete-btn { background:var(--bg-tertiary); border:1px solid var(--line); color:var(--stop-fg,#ff9a9a);
    border-radius:5px; font-size:11px; padding:3px 8px; cursor:pointer; }
  .rec-lctrl .rec-delete-btn:hover { border-color:var(--stop); }
  .rec-lctrl.recording-track.empty-track .track-name::after { content:" (vide)"; color:var(--muted); font-weight:400; }
  /* lane waveform fills the lane; canvas is full-width (not viewport-pinned) */
  #lanes .rec-lane { overflow:hidden; }
  #lanes .rec-lane .waveform { position:relative; height:100%; }
  #lanes .rec-lane .waveform canvas { position:absolute; left:0; top:0; width:100%; height:100%; }
  #lanes .rec-lane.is-recording { box-shadow:inset 0 0 0 1px var(--rec); }

  /* The transport bar, while relocated into a Focus popup, drops its bottom border
     and the mixer-only view controls (zoom/scroll/export) — only the practice-
     relevant controls (Play / From-Start / Stop / Rec / BPM / Key / count-in) stay. */
  .popup-transport-slot { flex:1 1 auto; min-width:0; }
  .transport.in-popup { border-bottom:none; padding:8px 12px; }
  .transport.in-popup #viewControls,
  .transport.in-popup #focusBtn,
  .transport.in-popup .spacer { display:none !important; }

  /* Karaoke word-fill robustness. The kept karaoke-display.js paints words with
     background-clip:text + text-fill-color:transparent, but only ever updates the
     CURRENT line's words — words on lines that are no longer active keep a stale
     transparent fill (sometimes with an emptied background) and VANISH.
     Fix without touching the JS: the transparent/gradient karaoke treatment only
     makes sense on the ACTIVE line, so force every word OUTSIDE the active line to
     show solid, normal text (overriding the stale inline transparent fill). On the
     active line we leave the JS's inline gradient/clip alone so the live wipe works. */
  #karaoke-container-lyrics .karaoke-line:not(.active) .karaoke-word,
  .lyrics-popup-overlay .karaoke-line:not(.active) .karaoke-word {
    background: none !important;
    -webkit-text-fill-color: currentColor !important;
    color: var(--text-secondary);
    opacity: 1;
  }
  /* past lines (already sung) read a touch dimmer than upcoming ones */
  #karaoke-container-lyrics .karaoke-line.past .karaoke-word,
  .lyrics-popup-overlay .karaoke-line.past .karaoke-word { color: var(--text-muted, var(--muted)); }
</style>

<!-- Safe localStorage for WebView2 iframe (Tracking Prevention may block storage) -->
<script>
  (function() {
    try { localStorage.getItem('_test'); } catch(e) {
      const _mem = {};
      window.localStorage = {
        getItem: k => _mem[k] || null,
        setItem: (k,v) => { _mem[k] = String(v); },
        removeItem: k => { delete _mem[k]; },
        clear: () => { for(const k in _mem) delete _mem[k]; },
        get length() { return Object.keys(_mem).length; },
        key: i => Object.keys(_mem)[i] || null
      };
      console.warn('[WebView2] localStorage blocked, using in-memory fallback');
    }
  })();
</script>
<!-- Extraction context, injected by the /mixer?extraction_id=... route. The POC
     engine loads this song via window.EXTRACTION_ID (see static/js/poc/main.js). -->
<script>
  const EXTRACTION_ID = "{{ extraction_id }}";
  window.EXTRACTION_ID = EXTRACTION_ID;
  const EXTRACTION_INFO = {{ extraction_info | tojson | safe }};
  window.EXTRACTION_INFO = EXTRACTION_INFO;
  console.log('[MIXER INIT] EXTRACTION_ID:', EXTRACTION_ID, 'INFO:', EXTRACTION_INFO);
</script>
<!-- Anti-FOUC theme bootstrap — runs before paint. The POC mixer interior is styled
     via body[data-theme]; friend's parent app uses class-based themes and pushes
     changes by postMessage. We map friend's theme name → a POC data-theme here, and
     keep listening for live theme_change messages (see the script block at the end). -->
<script>
  (function(){
    function mapFriendTheme(t){
      // friend theme classes → POC data-theme buckets
      if(!t || t === 'dark') return 'dark';
      if(t.indexOf('cyberpunk') !== -1) return 'cyberpunk';
      if(t.indexOf('neumorphic') !== -1) return 'neumorphic';
      return 'dark';
    }
    var t = 'dark';
    try { t = localStorage.getItem('stemtube_theme') || 'dark'; } catch(e){}
    document.body.setAttribute('data-theme', mapFriendTheme(t));
    document.body.setAttribute('data-tab', 'mixer');   // default internal tab
    window.__mapFriendTheme = mapFriendTheme;   // reused by the live listener
  })();
</script>

    </div>
    <!-- Real transport bar moved here while open (Play / From-Start / Stop / Rec +
         BPM value + Key note) — plus a lyrics-only text "Taille" (size) slider. -->

<!-- Recording: friend's engine + effects (verbatim) + the POC UI bridge.
     Loaded after the shim so window.mixer exists. -->
<script src="{{ url_for('static', filename='js/mixer/recording-effects.js') }}?v={{ cache_buster }}"></script>
<script src="{{ url_for('static', filename='js/mixer/recording-engine.js') }}?v={{ cache_buster }}"></script>
<script src="{{ url_for('static', filename='js/poc/recording-ui.js') }}?v={{ cache_buster }}"></script>
<script>
  // Instantiate the kept Chords component against the shim, and wire it into the
  // POC render loop + load lifecycle.
  (function(){
    if (!window.mixer || typeof ChordDisplay === "undefined") {
      console.error("[chords] mixer shim or ChordDisplay missing"); return;
    }
    window.mixer.chordDisplay = new ChordDisplay(window.mixer);
    window.chordDisplay = window.mixer.chordDisplay;   // some code expects the global

    // ── Recording engine (friend's, verbatim) + button wiring ──
    if (typeof RecordingEngine !== "undefined") {
      window.mixer.recordingEngine = new RecordingEngine(window.mixer);
      var recEngine = window.mixer.recordingEngine;

      // de-bleed progress over socket.io (already loaded for lyrics regen)
      var sock = window.mixerSocket || (typeof io !== "undefined" ? io() : null);
      if (sock) { window.mixerSocket = sock; if (recEngine.setupDebleedSocketListeners) recEngine.setupDebleedSocketListeners(sock); }

      var addBtn = document.getElementById("addTrackBtn");
      var recBtn = document.getElementById("recordBtn");
      if (addBtn) {
        addBtn.disabled = false;
        addBtn.addEventListener("click", function () {
          var track = recEngine.addEmptyTrack();
          if (track) window.mixer.trackControls.createRecordingTrackElement(track);
        });
      }
      if (recBtn) {
        recBtn.disabled = false;
        // lock/unlock the per-track mic selectors so the input device can't change
        // mid-take (that desyncs the live waveform from the recorder).
        function lockDevices(lock){ document.querySelectorAll(".rec-device-select").forEach(function(s){ s.disabled = lock; }); }
        recBtn.addEventListener("click", async function () {
          if (recEngine.isRecording || recBtn.__busy) {
            if (recBtn.__busy) return;            // a start/stop is already in flight
            recBtn.__busy = true; recBtn.disabled = true;
            try {
              recBtn.classList.remove("recording");
              await recEngine.stopRecording();
              if (window.mixer.waveform && window.mixer.waveform.redrawAllRecordings) window.mixer.waveform.redrawAllRecordings();
            } finally { recBtn.__busy = false; recBtn.disabled = false; lockDevices(false); }
            return;
          }
          var armed = recEngine.getArmedTracks();
          if (!armed.length) { window.mixer.showToast("Armez une piste d'abord (bouton R sur une piste d'enregistrement)", "warning"); return; }
          // No mic selected = friend's behaviour: record on the system default mic.
          armed.forEach(function (t) { var el = document.getElementById("rec-track-" + t.id); if (el) el.classList.add("is-recording"); });
          recBtn.__busy = true; recBtn.disabled = true;
          function abortStart(msg){
            if (msg) window.mixer.showToast(msg, "error");
            armed.forEach(function (t) { var el = document.getElementById("rec-track-" + t.id); if (el) el.classList.remove("is-recording"); });
          }
          try {
            // auto-calibrate latency before each take (records a click round-trip)
            try { await recEngine.calibrateLatency(); }
            catch (e) { console.warn("[recording] calibration failed, using fallback:", e); }
            // START PLAYBACK FIRST, capture SECOND. togglePlayPause can MOVE the
            // transport before audio rolls (rewind-at-end, baked count-in via
            // startWithPrecount) — snapshotting the offset before that misplaced
            // the take and recorded the whole count-in into it. So: play, wait
            // until the engine is really rolling (and past the Start point when a
            // count-in is armed), THEN start the MediaRecorder at the live pos.
            var hasPrecount = !engine.playing && window.PreCount && PreCount.beats > 0 && window.View && View.meta
              && engine.staticPos <= PreCount.startTime + 0.05;
            if (!engine.playing && typeof togglePlayPause === "function") togglePlayPause();
            var rolling = await new Promise(function (res) {
              var t0 = Date.now();
              (function poll() {
                if (engine.playing && (!hasPrecount || engine.pos() >= PreCount.startTime - 0.02)) return res(true);
                if (Date.now() - t0 > 30000) return res(false);   // count-in bake can take seconds
                requestAnimationFrame(poll);
              })();
            });
            if (!rolling) { abortStart("Lecture impossible — enregistrement annulé"); return; }
            var ok = await recEngine.startRecording(engine.pos() || 0);
            if (!ok) { abortStart("Enregistrement impossible — vérifiez l'autorisation micro"); return; }
            recBtn.classList.add("recording");
            lockDevices(true);
            // show compensated latency
            var lv = document.getElementById("latency-value");
            if (lv && recEngine.getEffectiveLatency) { var l = recEngine.getEffectiveLatency(); lv.textContent = l > 0 ? ("⏺ " + Math.round(l * 1000) + "ms") : ""; }
          } finally { recBtn.__busy = false; recBtn.disabled = false; }
        });
      }
    }

    // Structure (song sections) — constructor auto-loads from EXTRACTION_INFO; we
    // re-load with the real duration once the engine reports it (in onLoaded).
    if (typeof StructureDisplay !== "undefined") {
      window.mixer.structureDisplay = new StructureDisplay("#structure-container", window.EXTRACTION_ID);
    }
    // Karaoke/Lyrics — constructor auto-loads lyrics from EXTRACTION_INFO and sets
    // enabled=true when present, so sync() works straight away.
    if (typeof KaraokeDisplay !== "undefined") {
      window.mixer.karaokeDisplay = new KaraokeDisplay("#karaoke-container-lyrics", window.EXTRACTION_ID);
      window.karaokeDisplayInstance = window.mixer.karaokeDisplay;   // LyricsPopup expects this
    }
    // Lyrics Focus popup (kept). Instantiate so its close/slider/ESC wire up; we
    // trigger open() from the shared Focus button below.
    if (typeof LyricsPopup !== "undefined") {
      window.lyricsPopupInstance = new LyricsPopup();
    }

    var focusBtn = document.getElementById("focusBtn");
    var focusBtnLbl = document.getElementById("focusBtnLbl");

    function applyTab(tab){
      document.body.setAttribute("data-tab", tab);
      document.querySelectorAll("#mixerTabs .mtab").forEach(function(x){ x.classList.toggle("on", x.dataset.tab===tab); });
      // Focus button label per tab (hidden on Mixer via CSS)
      if(focusBtnLbl) focusBtnLbl.textContent = (tab==="chords") ? "Focus Chords" : (tab==="lyrics") ? "Focus Lyrics" : "Focus";
      // canvases sized to a hidden pane render at 0 width; redraw on return to Mixer
      if(tab === "mixer" && window.View && View.meta) View.redrawAll();
      // (re)sync the practice tab we're entering so its playhead is correct at once
      var p = engine.pos();
      if(tab === "chords" && window.mixer.chordDisplay) window.mixer.chordDisplay.sync(p);
      if(tab === "lyrics" && window.mixer.karaokeDisplay) window.mixer.karaokeDisplay.sync(p);
    }

    // Internal tab switcher (Mixer / Chords / Lyrics). Transport stays shared.
    document.getElementById("mixerTabs").addEventListener("click", function(e){
      var b = e.target.closest(".mtab"); if(!b) return;
      applyTab(b.dataset.tab);
    });

    // Focus button → open the popup matching the current tab.
    if(focusBtn){
      focusBtn.addEventListener("click", function(){
        var tab = document.body.getAttribute("data-tab");
        if(tab === "chords" && window.mixer.chordDisplay && window.mixer.chordDisplay.openGridPopup){
          window.mixer.chordDisplay.openGridPopup();
        } else if(tab === "lyrics" && window.lyricsPopupInstance && window.lyricsPopupInstance.open){
          window.lyricsPopupInstance.open();
        }
      });
    }

    // ── Move the REAL transport bar into whichever Focus popup is open ──
    // Gives the popup the exact same controls (Play / From-Start / Stop / Rec +
    // BPM value + Key note) as the main bar, with zero duplication. A placeholder
    // remembers the bar's home so we can restore it on close. We observe each
    // popup's open-state attribute so every close path (button / ESC / overlay)
    // restores the bar.
    (function(){
      var transport = document.querySelector(".transport");
      if(!transport) return;
      var home = document.createElement("div");
      home.style.display = "none";
      transport.parentNode.insertBefore(home, transport);   // marks the original spot

      function moveTo(slot){
        if(slot && transport.parentNode !== slot){ slot.appendChild(transport); }
        transport.classList.add("in-popup");
      }
      function restore(){
        if(transport.parentNode !== home.parentNode || transport.previousSibling !== home){
          home.parentNode.insertBefore(transport, home.nextSibling);
        }
        transport.classList.remove("in-popup");
        if(window.View && View.meta) View.redrawAll();   // lanes were hidden under the popup
      }

      function watch(popupId, slotId, isOpen){
        var popup = document.getElementById(popupId), slot = document.getElementById(slotId);
        if(!popup || !slot) return;
        new MutationObserver(function(){
          if(isOpen(popup)) moveTo(slot); else if(transport.classList.contains("in-popup")) restore();
        }).observe(popup, { attributes:true, attributeFilter:["aria-hidden","class"] });
      }
      // chords grid popup opens via aria-hidden="false"; lyrics popup via .active
      watch("chords-grid-popup", "chordsPopupTransportSlot", function(p){ return p.getAttribute("aria-hidden")==="false"; });
      watch("lyrics-popup", "lyricsPopupTransportSlot", function(p){ return p.classList.contains("active"); });
    })();
  })();
</script>

<!-- Song title → parent library (index.html) + live theme propagation from parent.
     Runs after main.js so the engine is wired; title comes from EXTRACTION_INFO. -->
<script>
  (function(){
    // Push the song title up to the parent shell.
    var info = window.EXTRACTION_INFO || {};
    var titleEl = document.getElementById('song-title-display');
    if (titleEl && info.title) {
      titleEl.textContent = info.title;
      titleEl.title = info.title;
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'mixer_song_title', title: info.title }, '*');
      }
    }
    // Live theme changes from the parent → map to the POC data-theme system.
    window.addEventListener('message', function(e){
      if (e.data && e.data.type === 'theme_change') {
        var poc = (window.__mapFriendTheme || function(){return 'dark';})(e.data.theme);
        document.body.setAttribute('data-theme', poc);
      }
    });
  })();
</script>
