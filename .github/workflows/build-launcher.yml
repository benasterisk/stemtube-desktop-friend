# Builds the Tauri launcher (NSIS installer) on GitHub-hosted Windows runners.
# No local Rust/MSVC toolchain needed: download the installer from the run's
# artifacts (Actions tab) and replace the setup.exe asset in the release.
name: Build launcher

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'package.json'
      - '.github/workflows/build-launcher.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare frontend dist (splash page only)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item src-tauri/splash.html dist/

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app (NSIS installer)
        run: npx tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StemTube_Desktop_Friend_setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
